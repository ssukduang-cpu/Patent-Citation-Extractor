{% extends "base.html" %}{% block content %}<h1>{{project.name}}</h1><form method="post" enctype="multipart/form-data" action="/projects/{{project.id}}/upload"><label>Patent PDF<input type="file" name="patent_pdf" required></label><label>Record add-ons<input type="file" name="addons" multiple></label><button>Upload + Parse</button></form><p><a href="/projects/{{project.id}}/viewer">Open viewer</a></p><form method="post" action="/projects/{{project.id}}/draft"><select name="proceeding_type"><option>IPR</option><option>Ex Parte Reexam</option></select><select name="drafting_mode"><option>Filing-Ready Draft</option><option>Neutral Memo</option></select><input name="claim_standard" placeholder="Override standard (optional)"><select name="action"><option value="claim_support">Embodiment-Based Claim Support Summary</option><option value="construction_table">Claim Term Construction Table</option></select><button>Generate draft</button></form><h3>Artifacts</h3><ul>{% for f in files %}<li><a href="/projects/{{project.id}}/download/{{f}}">{{f}}</a></li>{% endfor %}</ul><form method="post" action="/projects/{{project.id}}/delete"><button>Delete project</button></form>{% endblock %}
